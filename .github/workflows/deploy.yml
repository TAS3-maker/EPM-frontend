name: Deploy Frontend to Hostinger VPS

on:
  push:
    branches:
      - main  

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🏗️ Build project (ignore ESLint warnings)
        run: |
          export CI=false
          npm run build

      - name: 🧹 Clean previous build on VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_STAGING_HOST }}
          username: ${{ secrets.HOSTINGER_STAGING_USERNAME }}
          password: ${{ secrets.HOSTINGER_STAGING_PASSWORD }}
          script: |
            echo "🧹 Removing old build folder..."
            rm -rf /var/www/EPM/Frontend/build
            mkdir -p /var/www/EPM/Frontend/build

      - name: 🚀 Upload new build folder
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOSTINGER_STAGING_HOST }}
          username: ${{ secrets.HOSTINGER_STAGING_USERNAME }}
          password: ${{ secrets.HOSTINGER_STAGING_PASSWORD }}
          source: "build/"
          target: "/var/www/EPM/Frontend/"
          strip_components: 0

      - name: 🔁 Restart Apache2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.HOSTINGER_STAGING_HOST }}
          username: ${{ secrets.HOSTINGER_STAGING_USERNAME }}
          password: ${{ secrets.HOSTINGER_STAGING_PASSWORD }}
          script: |
            sudo systemctl restart apache2
            echo "✅ Apache restarted successfully!"
